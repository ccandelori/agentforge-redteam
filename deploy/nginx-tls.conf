#
# TLS-enabled nginx config — AgentForge Red Team operator UI.
#
# Certificate is Let's Encrypt against 104-248-232-22.sslip.io
# (sslip.io resolves any 1-2-3-4.sslip.io to that IP — no domain required).
# Cert auto-renews via the certbot.timer systemd unit installed by
# `apt-get install certbot`. Renewal hook reloads nginx; see
# /etc/letsencrypt/renewal-hooks/deploy/.
#
# Pairs with deploy/nginx-http-only.conf (port-80-only fallback). Pick
# one in deploy/push.sh — only the live server should ship one of them.
#

limit_req_zone $binary_remote_addr zone=agentforge_halt:1m rate=10r/m;
limit_req_zone $binary_remote_addr zone=agentforge_mut:1m rate=30r/m;

# ----- Port 80: redirect to HTTPS (preserve path + query) -------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt renewal: standalone certbot will briefly stop nginx
    # and listen on :80 itself, so we don't need a /.well-known/ webroot
    # block here. The deploy hook reloads nginx after a successful renewal.
    return 301 https://$host$request_uri;
}

# ----- Port 443: the real operator UI ---------------------------------------
server {
    # HTTP/2 omitted intentionally. We hit ERR_HTTP2_PROTOCOL_ERROR in
    # multiple browsers from the operator's network despite curl --http2
    # succeeding from elsewhere — almost certainly a middlebox mangling
    # h2 frames. HTTP/1.1 keeps the demo bulletproof; the SPA's payload
    # is a single small bundle anyway, so the multiplexing win is
    # negligible. Restore `http2` here once the deploy moves off this
    # IP (DNS migration would also reset any path-pinned middlebox state).
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name 104-248-232-22.sslip.io _;

    ssl_certificate     /etc/letsencrypt/live/104-248-232-22.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/104-248-232-22.sslip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS now safe to enable (we're on HTTPS for real). Six months — enough
    # to deter accidental http:// links in submissions/screenshots without
    # locking us out for years if we ever change cert strategy. Not preloaded.
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "interest-cohort=()" always;
    # Strict CSP — same as the HTTP-only config. Vite-built SPA, no CDN, no
    # inline scripts, no eval. style-src 'unsafe-inline' is the only loosening
    # (handful of inline `style="..."` attributes; Vue scoped styles would
    # let us drop it in a follow-up).
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        connect-src 'self';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    client_max_body_size 1m;
    client_body_timeout  15s;
    client_header_timeout 10s;
    keepalive_timeout    65s;
    send_timeout         15s;

    access_log /var/log/nginx/agentforge-redteam.access.log;
    error_log  /var/log/nginx/agentforge-redteam.error.log warn;

    # Server-level proxy headers so EVERY location inherits them (nginx
    # scopes proxy_set_header per-location and child blocks would otherwise
    # forward Host: 127.0.0.1:8080 to uvicorn).
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    proxy_buffering       off;

    location / {
        proxy_pass http://127.0.0.1:8080;
    }

    location = /halt {
        limit_req zone=agentforge_halt burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080;
    }

    location = /ui/halt {
        limit_req zone=agentforge_halt burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080;
    }

    # See nginx-http-only.conf for the trailing-slash trap rationale.
    location /ui/queue {
        limit_req zone=agentforge_mut burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
    }

    location = /sessions/start {
        limit_req zone=agentforge_mut burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8080;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }
}
