#
# nginx config — AgentForge Red Team operator UI.
#
# Drop in /etc/nginx/sites-available/agentforge-redteam, symlink into sites-enabled/.
# After install, run `certbot --nginx -d platform.example.com` to flip on TLS — certbot
# rewrites this file in-place to add the SSL listener + redirect.
#
# Replace BOTH occurrences of platform.example.com with your real domain BEFORE running
# certbot. Then run `nginx -t` to validate, then `systemctl reload nginx`.
#

# ---------------------------------------------------------------------------
# Rate limit zones — applied per destructive endpoint below.
#
# 10r/m on /halt: an operator clicking HALT in panic should not be limited, but a
# scripted attacker (or a bug) tripping it 100x/sec absolutely should be.
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=agentforge_halt:1m rate=10r/m;
limit_req_zone $binary_remote_addr zone=agentforge_mut:1m rate=30r/m;

# Plain HTTP — certbot keeps this server block for ACME challenges and adds a 301
# to https for everything else when --redirect is passed. Leaving it explicit so
# you can read what's happening.
server {
    listen 80;
    listen [::]:80;
    server_name platform.example.com;

    # Will be rewritten by certbot to: return 301 https://$host$request_uri;
    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — certbot adds the listen + ssl_certificate lines on first issue.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name platform.example.com;

    # certbot adds:
    #   ssl_certificate     /etc/letsencrypt/live/platform.example.com/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/platform.example.com/privkey.pem;
    #   include /etc/letsencrypt/options-ssl-nginx.conf;
    #   ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ----- security headers ------------------------------------------------
    # HSTS: 1 year, includeSubDomains. Drop preload until you're sure.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # Strict CSP: the Vite-built SPA loads only its own fingerprinted bundles
    # from /ui/assets/. No CDN. No inline scripts. No eval (templates are
    # pre-compiled at build time). The only loosening is 'unsafe-inline' on
    # style-src for the handful of inline `style="..."` attributes in
    # components.
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        connect-src 'self';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # ----- size + timeout caps --------------------------------------------
    # The UI doesn't ship big payloads. Cap at 1MB and bail aggressively if
    # the upstream stalls — the platform is single-droplet and slow uvicorn
    # = somebody else is in trouble.
    client_max_body_size 1m;
    client_body_timeout  15s;
    client_header_timeout 10s;
    keepalive_timeout    65s;
    send_timeout         15s;

    # ----- access log --------------------------------------------------------
    access_log /var/log/nginx/agentforge-redteam.access.log;
    error_log  /var/log/nginx/agentforge-redteam.error.log warn;

    # ----- server-level proxy headers ---------------------------------------
    # Hoisted to the server block so EVERY location inherits them. nginx
    # scopes proxy_set_header per-location and they do NOT inherit if a
    # child declares its own — so the rate-limited locations below stay
    # minimal (just proxy_pass + limit_req). Otherwise child locations
    # forward Host: 127.0.0.1:8080 to uvicorn and FastAPI's url_for()
    # builds links pointing at 127.0.0.1:8080 instead of the public host.
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    proxy_buffering       off;     # HTMX swaps are tiny; no buffer benefit.

    # uvicorn is told to trust 127.0.0.1 via --forwarded-allow-ips so it
    # honors the X-Forwarded-* headers above. Anyone bypassing nginx can
    # forge them, but they'd need access to loopback first.

    # ----- proxy to uvicorn on loopback -------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8080;
    }

    # ----- rate limits on destructive endpoints ----------------------------
    # Burst=5 with nodelay = first 5 requests pass instantly, rest get 503.
    # zone-name matches the limit_req_zone above.
    location = /halt {
        limit_req zone=agentforge_halt burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080;
    }

    location = /ui/halt {
        limit_req zone=agentforge_halt burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080;
    }

    # Prefix without trailing slash so /ui/queue (the page GET) matches
    # alongside /ui/queue/{id}/approve and /reject. A trailing slash here
    # would cause nginx to 301-redirect /ui/queue -> /ui/queue/, which
    # FastAPI's redirect_slashes would 307-redirect back, looping forever.
    location /ui/queue {
        limit_req zone=agentforge_mut burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
    }

    location = /sessions/start {
        limit_req zone=agentforge_mut burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
    }

    # ----- static assets (long cache, fingerprint via path) ---------------
    # Templates link to /static/style.css. CSS is small; we still cache it.
    location /static/ {
        proxy_pass http://127.0.0.1:8080;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }
}
