#
# HTTP-only nginx config — AgentForge Red Team operator UI.
#
# This is the MVP-quickstart variant: serves the UI over plain HTTP on
# the droplet's IP. BasicAuth at the FastAPI layer still gates everything.
#
# For TLS + real domain, see deploy/nginx.conf and Task 62 in the project plan.
#

limit_req_zone $binary_remote_addr zone=agentforge_halt:1m rate=10r/m;
limit_req_zone $binary_remote_addr zone=agentforge_mut:1m rate=30r/m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # No HSTS (we're not on HTTPS — would brick the site on TLS upgrade if cached).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "interest-cohort=()" always;
    # Strict CSP: the Vite-built SPA loads only its own fingerprinted bundles
    # from /ui/assets/. No CDN. No inline scripts. No eval (templates are
    # pre-compiled at build time). The only loosening is 'unsafe-inline' on
    # style-src for the handful of inline `style="..."` attributes in
    # components — Vue's scoped styles would let us drop that too in a
    # follow-up.
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        connect-src 'self';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    client_max_body_size 1m;
    client_body_timeout  15s;
    client_header_timeout 10s;
    keepalive_timeout    65s;
    send_timeout         15s;

    access_log /var/log/nginx/agentforge-redteam.access.log;
    error_log  /var/log/nginx/agentforge-redteam.error.log warn;

    # Server-level proxy headers so EVERY location inherits them. nginx scopes
    # proxy_set_header per-location and they do NOT inherit if a child location
    # declares its own. Putting them at the server level + keeping every
    # location block minimal (just proxy_pass + rate-limit) gets the
    # inheritance right. Otherwise child locations forward Host: 127.0.0.1:8080
    # to uvicorn, and FastAPI's url_for() then builds links pointing at
    # 127.0.0.1:8080 instead of the real public host.
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    proxy_buffering       off;

    location / {
        proxy_pass http://127.0.0.1:8080;
    }

    location = /halt {
        limit_req zone=agentforge_halt burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080;
    }

    location = /ui/halt {
        limit_req zone=agentforge_halt burst=5 nodelay;
        proxy_pass http://127.0.0.1:8080;
    }

    # Prefix without trailing slash so /ui/queue (the page GET) matches
    # alongside /ui/queue/{id}/approve and /reject. A trailing slash here
    # would cause nginx to 301-redirect /ui/queue -> /ui/queue/, which
    # FastAPI's redirect_slashes would 307-redirect back, looping forever.
    location /ui/queue {
        limit_req zone=agentforge_mut burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
    }

    location = /sessions/start {
        limit_req zone=agentforge_mut burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8080;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }
}
