# GitLab CI for agentforge-redteam
#
# Pipeline shape:
#   lint -> type-check -> test -> eval
#
# Every push / MR runs: lint, type-check, unit-test.
# Default branch + tags additionally run: integration-test.
# Tags additionally run: eval-judge (release gate).
#
# Dependencies are installed with uv from the frozen lockfile so the
# CI environment matches local exactly. The .venv/ and uv cache are
# cached keyed on uv.lock so reruns are fast.

image: python:3.11-slim

stages:
  - lint
  - type-check
  - test
  - eval

default:
  interruptible: true

variables:
  # Keep pip + uv quiet and reproducible.
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"
  # uv creates the project venv at .venv by default; pin it explicitly
  # so the cache key + path are stable across jobs.
  UV_PROJECT_ENVIRONMENT: "$CI_PROJECT_DIR/.venv"

# Shared setup: install uv, then sync the project (including the dev
# dependency group) from the frozen lockfile.
.uv-setup:
  before_script:
    - pip install --upgrade uv
    - uv sync --frozen --all-groups

# Shared cache config: keyed on the lockfile so dependency changes
# bust the cache automatically.
.uv-cache:
  cache:
    key:
      files:
        - uv.lock
    paths:
      - .venv/
      - .cache/uv/

lint:
  stage: lint
  extends:
    - .uv-setup
    - .uv-cache
  script:
    - uv run ruff check src/ tests/
    - uv run ruff format --check src/ tests/

type-check:
  stage: type-check
  extends:
    - .uv-setup
    - .uv-cache
  script:
    - uv run mypy src/

unit-test:
  stage: test
  extends:
    - .uv-setup
    - .uv-cache
  script:
    # Guard: tests/unit/ does not yet exist. Create it so pytest does
    # not fail on a missing path, then bail out gracefully (exit 0)
    # when no test files are present. Once real tests land this branch
    # is never taken.
    - mkdir -p tests/unit
    - |
      if [ -z "$(find tests/unit -type f -name 'test_*.py' -o -name '*_test.py' 2>/dev/null)" ]; then
        echo "No unit tests found in tests/unit/ yet — skipping pytest run."
        exit 0
      fi
    - uv run pytest tests/unit/ -v
        --cov=src/agentforge_redteam
        --cov-report=term
        --cov-report=xml
        -m "not integration and not slow"
  coverage: '/TOTAL.+?(\d+%)$/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week

integration-test:
  stage: test
  extends:
    - .uv-setup
    - .uv-cache
  script:
    - mkdir -p tests/integration
    - |
      if [ -z "$(find tests/integration -type f -name 'test_*.py' -o -name '*_test.py' 2>/dev/null)" ]; then
        echo "No integration tests found in tests/integration/ yet — skipping pytest run."
        exit 0
      fi
    - uv run pytest tests/integration/ -v -m integration
  rules:
    - if: '$CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

eval-judge:
  stage: eval
  extends:
    - .uv-setup
    - .uv-cache
  script:
    # The CLI is wired (Task 54) and exits:
    #   0  -> accuracy >= threshold (release gate passes)
    #   1  -> accuracy < threshold  (release gate fails)
    #   2  -> no cases matched the filters (operator error)
    #   3  -> no ANTHROPIC_API_KEY configured (soft skip — see below)
    #
    # ``allow_failure`` stays on UNTIL the operator provisions the
    # ANTHROPIC_API_KEY as a protected CI/CD variable (Settings -> CI/CD ->
    # Variables, masked + protected). Once the key is in place flip
    # ``allow_failure`` off so the release gate is non-trivial.
    - uv run agentforge-redteam eval-judge --threshold 0.85
  rules:
    - if: '$CI_COMMIT_TAG'
  allow_failure: true


# ---------------------------------------------------------------------------
# Nightly remote-trigger (optional — redundant with the droplet's systemd timer)
#
# Fires from a GitLab pipeline schedule (Build -> Pipeline schedules, cron
# `0 2 * * *` UTC). Connects to the platform droplet over SSH and triggers
# whatever the operator wants to run. Disabled until a schedule exists.
#
# Required CI/CD variables (Settings -> CI/CD -> Variables):
#   DEPLOY_SSH_PRIVATE_KEY  (file, protected, masked) — corresponds to a public
#                            key in /root/.ssh/authorized_keys on the droplet
#   PLATFORM_DROPLET_HOST   (variable)                — IP or DNS of the droplet
#   PLATFORM_SSH_USER       (variable, default: root) — SSH user on the droplet
# ---------------------------------------------------------------------------

nightly_run:
  stage: eval
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - cp "$DEPLOY_SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$PLATFORM_DROPLET_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      ssh "${PLATFORM_SSH_USER:-root}@$PLATFORM_DROPLET_HOST" \
        'systemctl start agentforge-redteam-nightly.service && \
         journalctl -u agentforge-redteam-nightly.service --since "5min ago" --no-pager'
  rules:
    # Only run from a Pipeline schedule, never on push or MR.
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  allow_failure: true
